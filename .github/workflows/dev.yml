name: Build Check on PR to dev

on:
  pull_request:
    branches:
      - dev # Cambia questo sezione in base al tuo branch principale

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set Up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24.15.0
        cache: yarn

    - name: Install Dependencies
      run: yarn install --frozen-lockfile

    - name: Build Project
      run: yarn build

